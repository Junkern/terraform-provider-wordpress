  #       run: |
  #         git diff --compact-summary --exit-code || \
  #           (echo; echo "Unexpected difference in directories after code generation. Run 'go generate ./...' command and commit."; exit 1)

  # Run acceptance tests in a matrix with Terraform CLI versions
  test:
    name: Terraform Provider Acceptance Tests
    # needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - '1.14.*'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: true
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      - name: Setup wp-env
        run: |
          node --version
          npm install -g @wordpress/env
          npm ls -g --depth=0 @wordpress/env
          wp-env --version
          wp-env start --runtime=playground
          wp-env status
          # Wait for wp-env to be ready before creating the application password.
          until curl -fsS http://localhost:8888/wp-json/wp/v2/ >/dev/null; do
            echo "Waiting for wp-env to be ready..."
            sleep 5
          done
          APPLICATION_PASSWORD=$(go run cmd/wpappauth/main.go --password password)
          sleep 10
          # Wait until the authenticated pages endpoint stops redirecting.
          max_attempts=12
          attempt=1
          while true; do
            response_headers=$(mktemp)
            response_body=$(mktemp)
            response_code=$(curl -sS -D "$response_headers" -o "$response_body" -w '%{http_code}' -u "admin:${APPLICATION_PASSWORD}" -X POST -H 'Content-Type: application/json' -d '{}' http://localhost:8888/wp-json/wp/v2/pages/ || true)
            echo $response_headers
            redirect_location=$(awk 'BEGIN { IGNORECASE = 1 } /^Location:/ { sub(/^Location:[[:space:]]*/, ""); print; exit }' "$response_headers")
            response_excerpt=$(tr '\n' ' ' < "$response_body" | cut -c1-200)
            rm -f "$response_headers" "$response_body"
            echo "pages endpoint probe ${attempt}/${max_attempts}: status=${response_code} location=${redirect_location:-<none>} body=${response_excerpt:-<empty>}"
            case "$response_code" in
              3*)
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "pages endpoint still redirecting after ${max_attempts} attempts"
                  exit 1
                fi
                echo "Waiting for the pages endpoint to become writable..."
                attempt=$((attempt + 1))
                sleep 5
                ;;
              *)
                break
                ;;
            esac
          done
          echo "APPLICATION_PASSWORD=${APPLICATION_PASSWORD}" >> $GITHUB_ENV
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          WP_TF_PROVIDER_PASSWORD: ${{ env.APPLICATION_PASSWORD }}
        run: TF_LOG=DEBUG TF_ACC=1  go test -v -cover ./internal/provider/ -run TestAccPageResource
        timeout-minutes: 10
