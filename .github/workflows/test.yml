  # Run acceptance tests in a matrix with Terraform CLI versions
  test:
    name: Terraform Provider Acceptance Tests
    # needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - '1.14.*'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      - name: Setup wp-env
        run: |
          npm install -g @wordpress/env
          wp-env start --runtime=playground
          APPLICATION_PASSWORD=$(go run cmd/wpappauth/main.go --password password)
          echo "APPLICATION_PASSWORD=${APPLICATION_PASSWORD}" >> $GITHUB_ENV
      - run: |
          curl http://localhost:8888/wp-json/
          # Wait for wp-env to be ready
          until curl -s http://localhost:8888/wp-json/wp/v2/; do
            echo "Waiting for wp-env to be ready..."
            sleep 5
          done
        timeout-minutes: 1
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          WP_TF_PROVIDER_PASSWORD: ${{ env.APPLICATION_PASSWORD }}
        run: go test -v -cover ./internal/provider/
        timeout-minutes: 10
